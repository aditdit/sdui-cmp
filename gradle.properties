# Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx6g
kotlin.native.jvmArgs=-Xmx4g

# Gradle
org.gradle.jvmargs=-Xmx8g -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true
